<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><title>Mark Attendance</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<style>body{background:#f0fdf4;display:flex;align-items:center;justify-content:center;min-height:100vh;}</style></head>
<body><div class="card p-4 text-center" style="max-width:400px;width:100%;border-radius:16px;">
<div style="font-size:3rem;">✅</div><h5 class="fw-bold mt-2">{{ session.lab.name }}</h5>
<p class="text-muted">{{ session.subject|default:"Lab Session" }} — {{ session.date }}</p>
<p>Student: <strong>{{ student.name }}</strong> ({{ student.roll_number }})</p>
<form method="post">{% csrf_token %}<button type="submit" class="btn btn-success w-100 py-2 fw-bold"><i class="fas fa-check me-2"></i>Confirm — Mark Me Present</button></form>
<a href="{% url 'student_self_dashboard' %}" class="btn btn-outline-secondary w-100 mt-2">Cancel</a>
</div><script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script></body></html>
