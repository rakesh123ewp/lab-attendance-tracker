<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Student Login</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
<style>
body{background:linear-gradient(135deg,#0f2044,#16a34a);min-height:100vh;display:flex;align-items:center;justify-content:center;position:relative;overflow:hidden;}
body::before{content:'';position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);width:600px;height:600px;background:url('/static/attendance/logo.png') center/contain no-repeat;opacity:.07;z-index:0;}
.card{border-radius:20px;padding:44px 40px;width:100%;max-width:420px;box-shadow:0 24px 60px rgba(0,0,0,.4);position:relative;z-index:1;}
.btn-success{background:#16a34a;border-color:#16a34a;}
.college-logo{width:88px;height:88px;object-fit:contain;}
</style></head>
<body>
<div class="card bg-white text-center">
    <img src="/static/attendance/logo.png" class="college-logo mx-auto mb-2" alt="East West" onerror="this.style.display='none'">
    <div style="color:#1a3a6b;font-size:.8rem;font-weight:700;letter-spacing:.5px;">EAST WEST INSTITUTE OF TECHNOLOGY</div>
    <hr class="my-3">
    <h5 class="fw-bold mb-1">Student Login</h5>
    <p class="text-muted small mb-4">Enter your Roll Number and Full Name</p>
    {% for message in messages %}<div class="alert alert-{{ message.tags }} py-2 text-start">{{ message }}</div>{% endfor %}
    <form method="post">{% csrf_token %}
        <div class="mb-3 text-start"><label class="form-label fw-semibold">Roll Number</label>
        <div class="input-group"><span class="input-group-text"><i class="fas fa-id-card"></i></span>
        <input type="text" name="roll_number" class="form-control" placeholder="e.g. 499CS23028" required autofocus></div></div>
        <div class="mb-4 text-start"><label class="form-label fw-semibold">Full Name</label>
        <div class="input-group"><span class="input-group-text"><i class="fas fa-user"></i></span>
        <input type="text" name="name" class="form-control" placeholder="e.g. Rakesh M" required></div></div>
        <button type="submit" class="btn btn-success w-100 py-2"><i class="fas fa-sign-in-alt me-2"></i>Login as Student</button>
    </form>
    <hr class="my-3">
    <a href="{% url 'login' %}" class="text-muted small"><i class="fas fa-chalkboard-teacher me-1"></i>Teacher Login</a>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body></html>
