{% extends 'attendance/base.html' %}{% block title %}{{ title }}{% endblock %}{% block page_title %}{{ title }}{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-md-6"><div class="card"><div class="card-header p-3"><i class="fas fa-calendar-plus me-2 text-primary"></i>{{ title }}</div><div class="card-body p-4">
<form method="post">{% csrf_token %}{% for field in form %}<div class="mb-3"><label class="form-label fw-semibold">{{ field.label }}</label>{{ field }}{% if field.errors %}<div class="text-danger small mt-1">{{ field.errors }}</div>{% endif %}</div>{% endfor %}
<div class="d-flex gap-2 mt-3"><button type="submit" class="btn btn-primary px-4"><i class="fas fa-arrow-right me-1"></i>Create & Mark Attendance</button><a href="{% url 'session_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form></div></div></div></div>{% endblock %}
