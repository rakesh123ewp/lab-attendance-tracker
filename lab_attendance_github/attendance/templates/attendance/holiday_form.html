{% extends 'attendance/base.html' %}{% block title %}Mark Holiday{% endblock %}{% block page_title %}Mark Holiday{% endblock %}{% block content %}
<div class="row justify-content-center"><div class="col-md-5"><div class="card"><div class="card-header p-3 bg-warning text-dark"><i class="fas fa-calendar-times me-2"></i>Declare a Holiday</div><div class="card-body p-4">
<form method="post">{% csrf_token %}
<div class="mb-3"><label class="form-label fw-semibold">Date</label><input type="date" name="date" class="form-control" required></div>
<div class="mb-4"><label class="form-label fw-semibold">Reason</label><input type="text" name="reason" class="form-control" placeholder="e.g. National Holiday, Exam, Fest" required></div>
<div class="d-flex gap-2"><button type="submit" class="btn btn-warning px-4"><i class="fas fa-calendar-check me-1"></i>Mark as Holiday</button><a href="{% url 'holiday_list' %}" class="btn btn-outline-secondary">Cancel</a></div>
</form></div></div></div></div>{% endblock %}
